services:
  postgres:
    image: postgres:17-alpine
    container_name: room-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - room_booking_data:/var/lib/postgresql/data

volumes:
  room_booking_data:
